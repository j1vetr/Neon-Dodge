kind = "web"
previewPath = "/"
title = "Neon Dodge - Hyper Casual Game"
version = "1.0.0"
id = "artifacts/neon-dodge"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19983

[services.development]
run = "pnpm --filter @workspace/neon-dodge run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/neon-dodge", "run", "build" ]
publicDir = "artifacts/neon-dodge/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19983"
BASE_PATH = "/"
