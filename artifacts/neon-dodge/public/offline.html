<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Dodge — Çevrimdışı</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050510;
      color: #00ffff;
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .icon {
      font-size: 64px;
      margin-bottom: 24px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    h1 {
      font-size: 28px;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 12px;
      text-shadow: 0 0 20px #00ffff;
    }
    p {
      font-size: 15px;
      color: #88aacc;
      line-height: 1.6;
      max-width: 300px;
      margin-bottom: 32px;
    }
    button {
      background: transparent;
      border: 2px solid #00ffff;
      color: #00ffff;
      font-size: 15px;
      letter-spacing: 2px;
      padding: 14px 32px;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s;
    }
    button:hover { background: #00ffff22; }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>Neon Dodge</h1>
  <p>İnternet bağlantısı bulunamadı.<br/>Lütfen bağlantını kontrol et ve tekrar dene.</p>
  <button onclick="location.reload()">Tekrar Dene</button>
</body>
</html>
